server {
    listen 80;
    server_name _;

    # Optional: static hosting only (no live sitemap/RSS/SEO).
    # The default Docker image uses the Node server instead (server/index.js).

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /env {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /env =404;
    }

    location = /rss {
        return 301 /rss.xml;
    }

    location = /sitemap {
        return 301 /sitemap.xml;
    }

    location /assets/ {
        try_files $uri =404;
    }
}
